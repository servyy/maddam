<!DOCTYPE html>
<html>
<head>
<title>Light the Candle</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    font-family: Arial, sans-serif;
    overflow:hidden;
    position:relative;
}

/* Candle container */
.candle {
    width: 8vw;
    max-width: 50px;
    height: 24vw;
    max-height: 150px;
    background: linear-gradient(to bottom, #fffacd, #f0e68c);
    border-radius: 20% 20% 5% 5%;
    position: relative;
    box-shadow: 0 0.5vw 0.6vw rgba(0,0,0,0.6);
}

/* Wick */
.wick {
    width: 0.8vw;
    max-width: 4px;
    height: 2.4vw;
    max-height: 12px;
    background:#333;
    position:absolute;
    top:-2.4vw;
    left:50%;
    transform:translateX(-50%);
    border-radius:0.4vw;
}

/* Flame - hidden initially */
.flame {
    width:3.6vw;
    max-width:18px;
    height:6vw;
    max-height:30px;
    background: radial-gradient(circle at 50% 50%, yellow 0%, orange 60%, transparent 100%);
    border-radius:50%;
    position:absolute;
    top:-6vw;
    left:50%;
    transform:translateX(-50%) scale(0);
}

/* Flicker animation */
@keyframes flicker {
    0% { transform: translateX(-50%) scale(1) rotate(-5deg); }
    50% { transform: translateX(-50%) scale(1.05) rotate(5deg); }
    100% { transform: translateX(-50%) scale(0.95) rotate(-3deg); }
}

/* Matchstick */
.match {
    width: 2vw;
    max-width: 10px;
    height: 16vw;
    max-height: 80px;
    background: linear-gradient(to bottom, #deb887, #a0522d);
    position: absolute;
    top:70%;
    left:10%;
    border-radius: 0.5vw;
    cursor: grab;
    box-shadow: 0.2vw 0.2vw 0.6vw rgba(0,0,0,0.6);
    touch-action: none; /* prevents default touch scrolling */
}

/* Match tip */
.match-tip {
    width: 2.8vw;
    max-width:14px;
    height:2.8vw;
    max-height:14px;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #990000);
    position:absolute;
    top:-1.4vw;
    left:50%;
    transform:translateX(-50%);
    border-radius:50%;
    box-shadow:0 0 0.3vw rgba(255,0,0,0.6);
}

/* Media query for very small screens */
@media (max-width: 400px) {
    .candle { width: 10vw; height: 30vw; }
    .wick { width: 1vw; height: 3vw; }
    .flame { width: 4vw; height: 7vw; }
    .match { width: 3vw; height: 20vw; }
    .match-tip { width: 4vw; height: 4vw; }
}
</style>
</head>
<body>

<div class="candle">
    <div class="wick"></div>
    <div class="flame" id="flame"></div>
</div>

<div class="match" id="match">
    <div class="match-tip"></div>
</div>

<script>
const match = document.getElementById("match");
const flame = document.getElementById("flame");
let dragging = false;
let offsetX = 0;
let offsetY = 0;
let lit = false;

// Helper for touch coordinates
function getTouchPos(e) {
    const touch = e.touches[0];
    return { x: touch.clientX, y: touch.clientY };
}

// Mouse events
match.addEventListener("mousedown", e => {
    dragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
    match.style.cursor = "grabbing";
});
document.addEventListener("mouseup", () => {
    dragging = false;
    match.style.cursor = "grab";
});
document.addEventListener("mousemove", e => {
    if(!dragging) return;
    moveMatch(e.clientX, e.clientY);
});

// Touch events
match.addEventListener("touchstart", e => {
    e.preventDefault();
    dragging = true;
    const touch = getTouchPos(e);
    const rect = match.getBoundingClientRect();
    offsetX = touch.x - rect.left;
    offsetY = touch.y - rect.top;
});
document.addEventListener("touchend", e => {
    dragging = false;
});
document.addEventListener("touchmove", e => {
    if(!dragging) return;
    const touch = getTouchPos(e);
    moveMatch(touch.x, touch.y);
});

// Move match
function moveMatch(clientX, clientY) {
    let x = clientX - offsetX;
    let y = clientY - offsetY;
    match.style.left = x + "px";
    match.style.top = y + "px";

    // Check overlap with wick
    const wick = document.querySelector(".wick").getBoundingClientRect();
    const tip = document.querySelector(".match-tip").getBoundingClientRect();

    const overlap = !(tip.right < wick.left || 
                     tip.left > wick.right || 
                     tip.bottom < wick.top || 
                     tip.top > wick.bottom);

    if(overlap && !lit){
        lit = true;
        flame.style.transform = "translateX(-50%) scale(1)";
        flame.style.animation = "flicker 0.2s infinite alternate";

        setTimeout(()=> {
            window.location.href = "cake2.html";
        }, 1000);
    }
}
</script>

</body>
</html>
